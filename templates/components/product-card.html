<a href="{{ href }}" class="product-card">
    <img class="product-card__image" alt="product-image" src="{{ image }}"/>
    <div class="product-card__data">
        <span class="product-card__data-product-name">{{ product_name }}</span>
        <span class="product-card__data-product-price">{{ price }}$</span>
    </div>
</a>
